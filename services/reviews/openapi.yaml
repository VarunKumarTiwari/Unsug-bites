openapi: 3.0.3
info:
  title: Reviews Service
  version: 0.1.0

paths:
  /reviews:
    post:
      summary: Submit a dish review
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Review' }

components:
  schemas:
    ReviewInput:
      type: object
      required: [userId, restaurantId, dishName, rating]
      properties:
        userId: { type: string }
        restaurantId: { type: string }
        dishName: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        note: { type: string }
        scanId: { type: string, nullable: true }

    Review:
      allOf:
        - $ref: '#/components/schemas/ReviewInput'
        - type: object
          required: [id, createdAt]
          properties:
            id: { type: string }
            createdAt: { type: string, format: date-time }
